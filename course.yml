# Course manifest — single source of truth for this course.
# Edit, then run: scripts/init-course.sh
#
# All placeholders {{LIKE_THIS}} in README.md / AGENTS.md / ROADMAP.md /
# .claude/skills/**/SKILL.md / CHANGELOG.md are filled from this file.

course:
  title: "System Design from Scratch"
  slug: "system-design-from-scratch"
  tagline: "From ambiguous prompts to senior-level architecture decisions. Design resilient systems, defend trade-offs, and practice Google and Cloudflare interview loops."
  topic: "system design"
  website: "https://github.com/KushnerykPavel/system-design-from-scratch"
  github: "https://github.com/KushnerykPavel/system-design-from-scratch"

style:
  # Per-lesson sections. Order is fixed; toggle which ones are mandatory.
  sections:
    problem: required
    concept: required
    build: required
    use: required
    attack: optional
    ship: required
    exercises: required
    test_vectors: optional

  # Languages used across the course. First entry is the default scaffolding lang.
  languages:
    - go

  # Reusable artifact types every lesson can ship.
  artifacts:
    - design-review-prompt
    - interview-card
    - capacity-worksheet
    - tradeoff-matrix
    - failure-mode-checklist
    - observability-checklist
    - skill
    - cli-tool

# Phases — fill before running init. Each phase becomes phases/NN-slug/.
# Lessons are NOT pre-created; use scripts/scaffold-lesson.sh per lesson.
